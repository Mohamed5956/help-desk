version: "3.9"

services:

  app:
    build: ./backend
    container_name: laravel-app
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: helpdesk
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
